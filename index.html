<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Director Tin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; max-width: 100vw; }
    body { background-color: #2a2727; min-height: 100vh; font-family: "Source Serif 4", serif; color: #fff; overflow-x: hidden; max-width: 100vw; }
    img { max-width: 100%; height: auto; }
    .page-wrapper { display: flex; flex-direction: column; align-items: center; padding: 48px 24px 64px; }
    .logo-container { width: 100%; max-width: 520px; opacity: 0; transform: translateY(-18px); animation: fadeDown 0.8s ease forwards; }
    .logo-container img { width: 100%; height: auto; display: block; border-radius: 8px; }
    .caption { margin-top: 20px; font-family: "Source Serif 4", serif; font-weight: 300; font-size: 1.05rem; color: #fff; text-align: center; width: 100%; max-width: 1100px; line-height: 1.6; opacity: 0; animation: fadeUp 0.8s ease 0.35s forwards; }
    .controls { margin-top: 32px; width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 10px; opacity: 0; animation: fadeUp 0.6s ease 0.5s forwards; }
    .search-box { display: flex; align-items: center; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 0 8px 0 14px; gap: 8px; }
    .search-box svg { flex-shrink: 0; opacity: 0.5; }
    .search-box input { background: none; border: none; outline: none; color: #fff; font-family: "Inter", sans-serif; font-size: 0.88rem; width: 100%; padding: 12px 0; }
    .search-box input::placeholder { color: rgba(255,255,255,0.35); }
    .search-box .clear-btn { margin: 5px 0; }
    .date-filters { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; }
    .date-filters label { font-family: "Inter", sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.5); white-space: nowrap; flex-shrink: 0; }
    .date-filters input[type="date"] { flex: 1; min-width: 0; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; font-family: "Inter", sans-serif; font-size: 0.75rem; padding: 9px 10px; outline: none; cursor: pointer; color-scheme: dark; }
    .date-sep { color: rgba(255,255,255,0.25); font-size: 0.75rem; flex-shrink: 0; }
    .clear-btn { flex-shrink: 0; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: rgba(255,255,255,0.6); font-family: "Inter", sans-serif; font-size: 0.78rem; padding: 9px 14px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    .clear-btn:hover { background: rgba(255,255,255,0.15); }
    .posts-header { margin-top: 24px; width: 100%; max-width: 1100px; display: flex; align-items: center; gap: 12px; }
    .posts-header::before, .posts-header::after { content: ""; flex: 1; height: 1px; background-color: rgba(255,255,255,0.25); }
    .posts-label { display: flex; align-items: center; gap: 7px; font-family: "Inter", sans-serif; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); white-space: nowrap; }
    .no-results { display: none; text-align: center; color: rgba(255,255,255,0.4); font-family: "Inter", sans-serif; font-size: 0.9rem; padding: 48px 0; width: 100%; }
    .grid { margin-top: 24px; width: 100%; max-width: 1100px; display: grid; grid-template-columns: repeat(, 1fr); gap: 16px; opacity: 0; animation: fadeUp 0.8s ease 0.65s forwards; }
    @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); } }
    .card { display: block; text-decoration: none; color: inherit; background: #0a2240; border-radius: 8px; overflow: hidden; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; background: rgba(255,255,255,0.06); }
    .card img.lazy { opacity: 0; transition: opacity 0.3s ease; }
    .card img.lazy-loaded { opacity: 1; }
    .load-more-sentinel { height: 1px; width: 100%; }
    .load-more-spinner { display: none; text-align: center; color: rgba(255,255,255,0.3); font-family: "Inter", sans-serif; font-size: 0.78rem; padding: 24px 0; width: 100%; letter-spacing: 0.05em; }
    .card-body { padding: 12px 14px 14px; }
    .card-date { font-family: "Inter", sans-serif; font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
    .card-headline { font-family: "Inter", sans-serif; font-weight: 600; font-size: 0.82rem; line-height: 1.4; color: #fff; }
    .card-caption { font-family: "Inter", sans-serif; font-size: 0.75rem; line-height: 1.45; color: rgba(255,255,255,0.55); margin-top: 6px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    @keyframes fadeDown { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="logo-container">
      <img src="logo.png" alt="Director Tin logo">
    </div>
    <p class="caption">Find the news articles to each post below.<br>All articles are free.</p>
    <div class="controls">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search headlines and captions..." oninput="debounceFilter()">
        <button class="clear-btn" onclick="clearFilters()">Clear</button>
      </div>
      <div class="date-filters">
        <label>From</label>
        <input type="date" id="dateFrom" onchange="onDateFromChange()" onkeydown="return false">
        <span class="date-sep">→</span>
        <input type="date" id="dateTo" onchange="onDateToChange()" onkeydown="return false">
      </div>
    </div>
    <div class="posts-header">
      <div class="posts-label">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="rgba(255,255,255,0.5)"><rect x="1" y="1" width="6" height="6" rx="0.5"/><rect x="9" y="1" width="6" height="6" rx="0.5"/><rect x="1" y="9" width="6" height="6" rx="0.5"/><rect x="9" y="9" width="6" height="6" rx="0.5"/></svg>
        Posts
      </div>
    </div>
    <div class="grid" id="grid">
      <p class="no-results" id="noResults">No posts match your search.</p>
    </div>
    <div class="load-more-spinner" id="loadSpinner">Loading more posts...</div>
    <div class="load-more-sentinel" id="loadSentinel"></div>
  </div>
  <script>
    let allPosts     = [];
    let visiblePosts = [];
    let renderedCount = 0;
    const PAGE_SIZE   = 20;
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function formatDisplay(isoDate) {
      const p = isoDate.split('-');
      return p[1] + '/' + p[2] + '/' + p[0];
    }

    let debounceTimer;
    function debounceFilter() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(filterCards, 220);
    }

    function makeCard(post) {
      const captionHtml = post.caption ? `<p class="card-caption">${post.caption}</p>` : '';
      const a = document.createElement('a');
      a.className = 'card';
      a.href      = post.url;
      a.target    = '_blank';
      a.innerHTML = `
        <img class="lazy" data-src="${post.image}" alt="Post image" style="object-position:${post.cropX ?? 50}% ${post.cropY ?? 50}%">
        <div class="card-body">
          <p class="card-date">${formatDisplay(post.date)}</p>
          <p class="card-headline">${post.headline}</p>
          ${captionHtml}
        </div>`;
      return a;
    }

    function renderPosts(posts) {
      const grid = document.getElementById('grid');
      grid.querySelectorAll('.card').forEach(c => c.remove());
      visiblePosts  = posts;
      renderedCount = 0;
      document.getElementById('noResults').style.display = posts.length === 0 ? 'block' : 'none';
      appendNextPage();
    }

    function appendNextPage() {
      if (renderedCount >= visiblePosts.length) {
        document.getElementById('loadSpinner').style.display = 'none';
        return;
      }
      const grid  = document.getElementById('grid');
      const batch = visiblePosts.slice(renderedCount, renderedCount + PAGE_SIZE);
      const frag  = document.createDocumentFragment();
      batch.forEach(post => frag.appendChild(makeCard(post)));
      grid.appendChild(frag);
      renderedCount += batch.length;
      observeLazyImages(grid);
      document.getElementById('loadSpinner').style.display =
        renderedCount < visiblePosts.length ? 'block' : 'none';
    }

    // Infinite scroll observer
    const sentinel = document.getElementById('loadSentinel');
    const observer = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) appendNextPage();
    }, { rootMargin: '800px' });
    observer.observe(sentinel);

    // Lazy image loader — fires when image is 200px from entering viewport
    const imgObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const img = entry.target;
          img.src = img.dataset.src;
          img.onload  = () => img.classList.add('lazy-loaded');
          img.onerror = () => img.classList.add('lazy-loaded'); // show broken gracefully too
          imgObserver.unobserve(img);
        }
      });
    }, { rootMargin: '300px' });

    function observeLazyImages(container) {
      container.querySelectorAll('img.lazy').forEach(img => imgObserver.observe(img));
    }

    function todayISO() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function initDateInputs() {
      const today = todayISO();
      document.getElementById('dateFrom').max = today;
      document.getElementById('dateTo').max   = today;
    }

    function onDateFromChange() {
      const val = document.getElementById('dateFrom').value;
      // Grey out everything before "from" in the "to" picker
      document.getElementById('dateTo').min = val || '';
      filterCards();
    }

    function onDateToChange() {
      const val = document.getElementById('dateTo').value;
      // Grey out everything after "to" in the "from" picker
      document.getElementById('dateFrom').max = val || todayISO();
      filterCards();
    }

    function filterCards() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const from  = document.getElementById('dateFrom').value;
      const to    = document.getElementById('dateTo').value;
      const filtered = allPosts.filter(post => {
        const matchSearch = !query
          || (post.headline || '').toLowerCase().includes(query)
          || (post.caption  || '').toLowerCase().includes(query);
        const matchFrom = !from || post.date >= from;
        const matchTo   = !to   || post.date <= to;
        return matchSearch && matchFrom && matchTo;
      });
      renderPosts(filtered);
    }

    function clearFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('dateFrom').value    = '';
      document.getElementById('dateTo').value      = '';
      renderPosts(allPosts);
    }

    fetch('posts.json?t=' + Date.now())
      .then(r => r.json())
      .then(posts => { allPosts = posts; initDateInputs(); renderPosts(posts); })
      .catch(() => {});
  </script>
</body>
</html>
